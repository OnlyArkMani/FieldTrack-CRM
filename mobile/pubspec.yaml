# FieldTrack mobile — Android-first, min SDK 21, low-end device friendly.
#
# VERSION NOTE: caret pins below are known-good majors as of mid-2025.
# Run `flutter pub outdated` once and bump patch versions before first build.
#
# DECISIONS:
# - background_locator_2 is community-maintained and aging; it's the spec'd
#   choice and works on SDK 21. Isolate its usage behind one service class
#   (lib/core/location/) so it can be swapped without touching features.
# - flutter_map_tile_caching v9 pairs with flutter_map v7 — do not bump one
#   without the other.
# - No flutter_secure_storage in the spec'd list, so tokens live in
#   shared_preferences. Acceptable for this threat model (no payment data);
#   revisit if requirements change.

name: fieldtrack_mobile
description: FieldTrack employee tracking & attendance
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2

  # Maps (OpenStreetMap + offline tiles)
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.4
  latlong2: ^0.9.1  # LatLng type used directly by flutter_map APIs

  # Location
  geolocator: ^13.0.4
  background_locator_2: ^2.0.6
  permission_handler: ^11.4.0
  # Added beyond the original spec list — required by the GPS phase:
  battery_plus: ^6.2.1        # battery level per location record + adaptive cadence
  device_info_plus: ^11.4.0   # Build.MANUFACTURER for OEM kill-list handling
  android_intent_plus: ^5.3.0 # deep links to MIUI/ColorOS/etc. autostart screens

  # Storage & network
  sqflite: ^2.4.2
  dio: ^5.8.0
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  flutter_dotenv: ^5.2.1

  # Firebase / notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Misc
  image_picker: ^1.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0

  # Reports — save generated exports to disk + share via the system sheet
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
